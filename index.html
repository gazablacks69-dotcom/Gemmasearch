<!DOCTYPE html>
<html>
<head><title>Web Search</title></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const parsed = JSON.parse(data);
    const query = parsed.query;
    const apiKey = secrets['GOOGLE_API_KEY'];
    const engineId = secrets['SEARCH_ENGINE_ID'];

    const url = `https://www.googleapis.com/customsearch/v1?key=${apiKey}&cx=${engineId}&q=${encodeURIComponent(query)}&num=5`;

    const response = await fetch(url);
    const json = await response.json();

    if (!json.items || json.items.length === 0) {
      return JSON.stringify({ result: "No results found for: " + query });
    }

    const results = json.items.map((item, i) =>
      `${i+1}. **${item.title}**\n${item.snippet}\n${item.link}`
    ).join('\n\n');

    return JSON.stringify({ result: results });

  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
};
</script>
</body>
</html>
